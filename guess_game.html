<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай число</title>
    <style>
        :root {
            --bg1: #f6efe4;
            --bg2: #ead8bf;
            --card: #fffaf3;
            --text: #1f2937;
            --accent: #b45f1d;
            --accent-dark: #8e4914;
            --border: #dfc9aa;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top, var(--bg1), var(--bg2));
        }

        .card {
            width: min(460px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 28px;
            box-shadow: 0 22px 50px rgba(74, 45, 18, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 18px;
            line-height: 1.5;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
        }

        input {
            flex: 1;
            padding: 12px 14px;
            font-size: 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        button {
            padding: 12px 16px;
            font-size: 1rem;
            border: 0;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        #message {
            min-height: 28px;
            font-size: 1.05rem;
            font-weight: 600;
        }

        .hint {
            margin-top: 14px;
            font-size: 0.95rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Угадай число</h1>
        <p>Страница загадывает случайное число от 1 до 10. Введи число и попробуй угадать.</p>

        <div class="row">
            <input id="guessInput" type="number" min="1" max="10" placeholder="Введите число">
            <button id="checkButton">Проверить</button>
        </div>

        <div id="message"></div>
        <div class="hint">После правильного ответа будет загадано новое число.</div>
    </main>

    <script>
        let secret = Math.floor(Math.random() * 10) + 1;

        const guessInput = document.getElementById("guessInput");
        const checkButton = document.getElementById("checkButton");
        const message = document.getElementById("message");

        function checkGuess() {
            const guess = Number(guessInput.value);

            if (!Number.isInteger(guess) || guess < 1 || guess > 10) {
                message.textContent = "Введите целое число от 1 до 10.";
                return;
            }

            if (guess === secret) {
                message.textContent = "Угу. Ты угадал.";
                secret = Math.floor(Math.random() * 10) + 1;
            } else {
                message.textContent = "Не угадал. Попробуй еще раз.";
            }

            guessInput.value = "";
            guessInput.focus();
        }

        checkButton.addEventListener("click", checkGuess);
        guessInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                checkGuess();
            }
        });
    </script>
</body>
</html>
